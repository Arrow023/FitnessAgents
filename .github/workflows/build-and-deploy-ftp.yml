name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: FitnessAgentsWeb/FitnessAgentsWeb.csproj

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: Publish output
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ./publish --no-build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Take site offline
        run: |
          echo '<html><body><h1>Updating... please wait.</h1></body></html>' > app_offline.htm
          lftp -e "set ftp:passive-mode yes; set ssl:verify-certificate no; put -O /wwwroot/ app_offline.htm; bye" \
            -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_SERVER }}"

      - name: Wait for app to stop
        run: sleep 5

      - name: Deploy files via FTP
        run: |
          lftp -e "set ftp:passive-mode yes; set ssl:verify-certificate no; set net:max-retries 3; mirror --reverse --verbose --parallel=5 ./publish/ /wwwroot/; bye" \
            -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_SERVER }}"

      - name: Bring site online
        run: |
          lftp -e "set ftp:passive-mode yes; set ssl:verify-certificate no; rm -f /wwwroot/app_offline.htm; bye" \
            -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_SERVER }}"
