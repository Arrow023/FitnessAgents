<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!--[if mso]>
    <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
    <![endif]-->
    <style>
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        body { margin: 0; padding: 0; width: 100% !important; }
        img { border: 0; line-height: 100%; text-decoration: none; -ms-interpolation-mode: bicubic; }
    </style>
</head>
<body style="margin: 0; padding: 0; width: 100% !important; background-color: #f0ece4; -webkit-font-smoothing: antialiased;">

<!-- Outer wrapper -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f0ece4;">
<tr><td align="center" style="padding: 40px 16px;">

<!-- Main card -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06);">

    <!-- Accent bar -->
    <tr><td style="height: 5px; background-color: #059669; font-size: 0; line-height: 0;">&nbsp;</td></tr>

    <!-- Brand header -->
    <tr><td style="padding: 32px 40px 20px 40px; border-bottom: 1px solid #e8e4dc;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
                <td width="48" valign="middle" style="padding-right: 14px;">
                    <img src="cid:logo" width="44" height="44" alt="FitnessAgents" style="display: block; border-radius: 12px; border: 0;">
                </td>
                <td valign="middle">
                    <p style="margin: 0; color: #1a1a1a; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.2;">FitnessAgents</p>
                    <p style="margin: 2px 0 0 0; color: #059669; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;">Your AI Nutritionist</p>
                </td>
            </tr>
        </table>
    </td></tr>

    <!-- Section header -->
    <tr><td style="padding: 20px 40px 24px 40px; border-bottom: 1px solid #e8e4dc;">
        <div style="display: inline-block; background-color: #d97706; color: #ffffff; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border-radius: 4px;">Nutrition Plan</div>
        <p style="margin: 12px 0 0 0; color: #8c8579; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 14px; font-weight: 500;">{{DATE}}</p>
    </td></tr>

    <!-- Calorie target & AI summary -->
    <tr><td style="padding: 28px 40px; background-color: #faf8f5; border-bottom: 1px solid #e8e4dc;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border: 1px solid #e8e4dc; border-radius: 12px;">
            <tr><td style="padding: 22px;">
                <!-- Calorie target -->
                <div style="background-color: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;">
                    <span style="color: #b45309; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;">&#x1F4CA; Daily Target</span>
                    <div style="margin-top: 4px;">
                        <span style="color: #92400e; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -1px;">{{TOTAL_CALORIES}}</span>
                        <span style="color: #b45309; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 10px; font-weight: 600; margin-left: 4px;">KCAL</span>
                    </div>
                </div>

                <!-- AI Summary -->
                <p style="margin: 0; color: #57534e; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-style: italic; line-height: 1.7; font-size: 14px;">&ldquo;{{AI_SUMMARY}}&rdquo;</p>
            </td></tr>
        </table>
    </td></tr>

    <!-- Diet content -->
    <tr><td style="padding: 36px 40px 48px 40px; background-color: #ffffff;">
        {{DIET_CONTENT}}
    </td></tr>

    <!-- Footer -->
    <tr><td style="padding: 24px 40px; background-color: #faf8f5; border-top: 1px solid #e8e4dc; text-align: center;">
        <p style="margin: 0 0 4px 0; color: #059669; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 13px; font-weight: 700;">FitnessAgents</p>
        <p style="margin: 0; color: #b0a99e; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; font-size: 11px; font-weight: 500;">Nutrition optimized for your recovery &amp; vitals</p>
    </td></tr>

</table>
<!-- /Main card -->

</td></tr>
</table>
</body>
</html>
